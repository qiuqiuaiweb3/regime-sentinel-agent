substitutions:
  _REGION: asia-northeast1
  _SERVICE: regime-sentinel-agent
  _REPOSITORY: regime-sentinel
  _IMAGE: regime-service
  _SERVICE_ACCOUNT: 998092298764-compute@developer.gserviceaccount.com

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -lc
      - |
        gcloud artifacts repositories describe "$_REPOSITORY" \
          --location="$_REGION" >/dev/null 2>&1 \
        || gcloud artifacts repositories create "$_REPOSITORY" \
          --repository-format=docker \
          --location="$_REGION"

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_SERVICE_ACCOUNT}
      - --cpu=1
      - --memory=1Gi
      - --min-instances=1
      - --max-instances=1
      - --concurrency=80
      - --timeout=3600s
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_REGION=${_REGION},LIVE_COLLECTOR_ENABLED=false,GEMINI_ENABLED=false,GEMINI_PROVIDER=vertex,GEMINI_LOCATION=global,REGIME_STATIC_DIR=/app/build,AGENT_TOOL_MONGODB_TIMEOUT_MS=1500
      - --set-secrets=MONGODB_URI=mongodb-uri:latest,MONGODB_DB=mongodb-db:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID
