substitutions:
  _REGION: asia-northeast3
  _SERVICE: regime-sentinel-agent
  _REPOSITORY: regime-sentinel
  _IMAGE: regime-service
  _SERVICE_ACCOUNT: 998092298764-compute@developer.gserviceaccount.com

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -lc
      - |
        gcloud artifacts repositories describe "$_REPOSITORY" \
          --location="$_REGION" >/dev/null 2>&1 \
        || gcloud artifacts repositories create "$_REPOSITORY" \
          --repository-format=docker \
          --location="$_REGION"

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_SERVICE_ACCOUNT}
      - --cpu=1
      - --memory=1Gi
      - --min-instances=1
      - --max-instances=1
      - --no-cpu-throttling
      - --concurrency=80
      - --timeout=3600s
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_REGION=${_REGION},SERVICE_PUBLIC_URL=https://regime-sentinel-agent-998092298764.asia-northeast3.run.app,LIVE_COLLECTOR_ENABLED=true,LIVE_MARKET_SLUG=auto,LIVE_MARKET_SERIES=btc-updown-5m,LIVE_COLLECTOR_NDJSON_PATH=/tmp/live-fallback.ndjson,REFERENCE_PRICE_SYMBOL=btc/usd,GEMINI_ENABLED=true,GEMINI_PROVIDER=vertex,GEMINI_LOCATION=${_REGION},GEMINI_SUMMARY_INTERVAL_MINUTES=30,GEMINI_MAX_CALLS_PER_HOUR=2,REGIME_STATIC_DIR=/app/build,AGENT_TOOL_MONGODB_TIMEOUT_MS=1500
      - --set-secrets=MONGODB_URI=mongodb-uri:latest,MONGODB_DB=mongodb-db:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID
